name: CI

on:
  push:
    branches: [develop, master]
    tags: ['v*']
  pull_request:
    branches: [develop, master]

permissions:
  contents: write
  packages: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_BUILD: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repo_lc: ${{ steps.lowercase.outputs.repo_lc }}
    steps:
      - id: lowercase
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  lint:
    needs: setup
    runs-on: ubuntu-latest
    container: ghcr.io/${{ needs.setup.outputs.repo_lc }}/ci:2.0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry/index/
            /usr/local/cargo/registry/cache/
            /usr/local/cargo/git/db/
            target/
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo check
        run: cargo check

  build-and-test:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-container: true
            artifact-name: linux-amd64
            strip-cmd: strip
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use-container: true
            artifact-name: linux-arm64
            strip-cmd: strip
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-24.04-arm
            use-container: true
            artifact-name: linux-armhf
            strip-cmd: arm-linux-gnueabihf-strip
            cc: arm-linux-gnueabihf-gcc
            pkg-config-path: /usr/lib/arm-linux-gnueabihf/pkgconfig
            bindgen-target: arm-linux-gnueabihf
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.use-container && format('ghcr.io/{0}/ci:2.0', needs.setup.outputs.repo_lc) || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry/index/
            /usr/local/cargo/registry/cache/
            /usr/local/cargo/git/db/
            target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target ${{ matrix.target }} $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg-config-path || env.PKG_CONFIG_PATH || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.cc && '1' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.bindgen-target && format('--target={0} --sysroot=/usr/{0}', matrix.bindgen-target) || '' }}

      - name: Test
        run: cargo test --release --target ${{ matrix.target }}
        env:
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg-config-path || env.PKG_CONFIG_PATH || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.cc && '1' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.bindgen-target && format('--target={0} --sysroot=/usr/{0}', matrix.bindgen-target) || '' }}

      - name: Upload binary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/pcloud
          retention-days: 5

  build-macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute cache key
        id: cache-key
        run: echo "week=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-arm64-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: brew-arm64-${{ runner.os }}-

      - name: Install native (arm64) dependencies
        run: brew install macfuse openssl pkg-config
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Cache Rosetta Homebrew + x86_64 OpenSSL
        id: cache-rosetta
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            /usr/local/Cellar/openssl@3
            /usr/local/opt/openssl@3
            /usr/local/bin/brew
          key: brew-rosetta-openssl3-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: brew-rosetta-openssl3-${{ runner.os }}-

      - name: Install x86_64 dependencies via Rosetta
        if: steps.cache-rosetta.outputs.cache-hit != 'true'
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install openssl@3

      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-macos-universal-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-macos-universal-

      - name: Build aarch64
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target aarch64-apple-darwin $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          PKG_CONFIG_PATH: /opt/homebrew/opt/openssl@3/lib/pkgconfig

      - name: Build x86_64
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target x86_64-apple-darwin $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          PKG_CONFIG_PATH: /usr/local/opt/openssl@3/lib/pkgconfig

      - name: Test (native aarch64 only)
        run: cargo test --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create -output pcloud-macos-universal \
            target/aarch64-apple-darwin/release/pcloud \
            target/x86_64-apple-darwin/release/pcloud
          lipo -info pcloud-macos-universal
          strip pcloud-macos-universal

      - name: Upload universal binary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-universal
          path: pcloud-macos-universal
          retention-days: 5

  package:
    runs-on: ubuntu-latest
    needs: [setup, lint, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    container: ghcr.io/${{ needs.setup.outputs.repo_lc }}/ci:2.0
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact-name: linux-amd64
            strip-cmd: strip
            deb-arch: amd64
            rpm-arch: x86_64
          - target: aarch64-unknown-linux-gnu
            artifact-name: linux-arm64
            strip-cmd: aarch64-linux-gnu-strip
            deb-arch: arm64
            rpm-arch: aarch64
          - target: armv7-unknown-linux-gnueabihf
            artifact-name: linux-armhf
            strip-cmd: arm-linux-gnueabihf-strip
            deb-arch: armhf
            rpm-arch: armv7hl
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/

      - name: Ensure binary is executable
        run: chmod +x target/${{ matrix.target }}/release/pcloud

      - name: Build .deb
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Build .rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Strip binary
        run: ${{ matrix.strip-cmd }} target/${{ matrix.target }}/release/pcloud

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.artifact-name }}
          retention-days: 30
          path: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm
            target/${{ matrix.target }}/release/pcloud

  release:
    runs-on: ubuntu-latest
    needs: [package, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Linux binaries and packages
          for arch in linux-amd64 linux-arm64 linux-armhf; do
            if [ -d "artifacts/packages-${arch}" ]; then
              # Rename binary with arch suffix
              cp "artifacts/packages-${arch}/release/pcloud" "release/pcloud-${arch}" 2>/dev/null || \
              cp "artifacts/packages-${arch}/"*/release/pcloud "release/pcloud-${arch}" 2>/dev/null || true

              # Copy .deb packages
              find "artifacts/packages-${arch}" -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true

              # Copy .rpm packages
              find "artifacts/packages-${arch}" -name '*.rpm' -exec cp {} release/ \; 2>/dev/null || true
            fi
          done

          # macOS universal binary
          if [ -d "artifacts/binary-macos-universal" ]; then
            cp "artifacts/binary-macos-universal/pcloud-macos-universal" "release/pcloud-macos-universal" 2>/dev/null || true
          fi

          ls -la release/

      - name: Detect package filenames
        id: pkgnames
        run: |
          echo "deb_amd64=$(basename release/*_amd64.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "deb_arm64=$(basename release/*_arm64.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "deb_armhf=$(basename release/*_armhf.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_x86_64=$(basename release/*.x86_64.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_aarch64=$(basename release/*.aarch64.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_armv7hl=$(basename release/*.armv7hl.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          body: |
            ## Installation

            ### Linux — x86_64 (64-bit Intel/AMD)

            ```bash
            curl -L -o pcloud https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-linux-amd64
            chmod +x pcloud && mv pcloud ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud /usr/local/bin/
            ```

            ### Linux — ARM 64-bit (Raspberry Pi 4/5, AWS Graviton, etc.)

            ```bash
            curl -L -o pcloud https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-linux-arm64
            chmod +x pcloud && mv pcloud ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud /usr/local/bin/
            ```

            ### Linux — ARM 32-bit (Raspberry Pi 2/3, older ARM boards)

            ```bash
            curl -L -o pcloud https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-linux-armhf
            chmod +x pcloud && mv pcloud ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud /usr/local/bin/
            ```

            ### Debian / Ubuntu — x86_64

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_amd64 }}
            sudo dpkg -i ${{ steps.pkgnames.outputs.deb_amd64 }}
            ```

            ### Debian / Ubuntu — ARM 64-bit

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_arm64 }}
            sudo dpkg -i ${{ steps.pkgnames.outputs.deb_arm64 }}
            ```

            ### Debian / Ubuntu — ARM 32-bit

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_armhf }}
            sudo dpkg -i ${{ steps.pkgnames.outputs.deb_armhf }}
            ```

            ### Fedora / RHEL — x86_64

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.rpm_x86_64 }}
            sudo rpm -i ${{ steps.pkgnames.outputs.rpm_x86_64 }}
            ```

            ### Fedora / RHEL — ARM 64-bit

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.rpm_aarch64 }}
            sudo rpm -i ${{ steps.pkgnames.outputs.rpm_aarch64 }}
            ```

            ### Fedora / RHEL — ARM 32-bit

            ```bash
            curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.rpm_armv7hl }}
            sudo rpm -i ${{ steps.pkgnames.outputs.rpm_armv7hl }}
            ```

            ### Arch Linux (build from source)

            A [PKGBUILD](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/pkg/arch/PKGBUILD) is included in the repository for x86_64, aarch64, and armv7h:

            ```bash
            curl -L -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/pkg/arch/PKGBUILD
            makepkg -si
            ```

            ### macOS (Apple Silicon & Intel)

            > **Prerequisites** — install only what you don't already have:
            >
            > ```bash
            > brew install --cask macfuse   # Required: provides FUSE support
            > brew install openssl@3        # Required: provides TLS support
            > ```

            ```bash
            curl -L -o pcloud https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-macos-universal
            chmod +x pcloud && mv pcloud ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud /usr/local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
