name: CI

on:
  push:
    branches: [develop, master]
    tags: ['v*']
  pull_request:
    branches: [develop, master]

permissions:
  contents: write
  packages: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_BUILD: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repo_lc: ${{ steps.lowercase.outputs.repo_lc }}
    steps:
      - id: lowercase
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  lint:
    needs: setup
    runs-on: ubuntu-latest
    container: ghcr.io/${{ needs.setup.outputs.repo_lc }}/ci:2.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry/index/
            /usr/local/cargo/registry/cache/
            /usr/local/cargo/git/db/
            target/
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo check
        run: cargo check

  build-and-test:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-container: true
            artifact-name: linux-amd64
            strip-cmd: strip
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use-container: true
            artifact-name: linux-arm64
            strip-cmd: strip
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-24.04-arm
            use-container: true
            artifact-name: linux-armhf
            strip-cmd: arm-linux-gnueabihf-strip
            cc: arm-linux-gnueabihf-gcc
            pkg-config-path: /usr/lib/arm-linux-gnueabihf/pkgconfig
            bindgen-target: arm-linux-gnueabihf
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.use-container && format('ghcr.io/{0}/ci:2.1', needs.setup.outputs.repo_lc) || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry/index/
            /usr/local/cargo/registry/cache/
            /usr/local/cargo/git/db/
            target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target ${{ matrix.target }} $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg-config-path || env.PKG_CONFIG_PATH || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.cc && '1' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.bindgen-target && format('--target={0} --sysroot=/usr/{0}', matrix.bindgen-target) || '' }}

      - name: Test
        run: cargo test --release --target ${{ matrix.target }}
        env:
          CC: ${{ matrix.cc || '' }}
          PKG_CONFIG_PATH: ${{ matrix.pkg-config-path || env.PKG_CONFIG_PATH || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.cc && '1' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.bindgen-target && format('--target={0} --sysroot=/usr/{0}', matrix.bindgen-target) || '' }}

      - name: Upload binary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/pcloud-cli
          retention-days: 5

  build-macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute cache key
        id: cache-key
        run: echo "week=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-arm64-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: brew-arm64-${{ runner.os }}-

      - name: Install native (arm64) dependencies
        run: brew install macfuse openssl pkg-config
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Cache Rosetta Homebrew + x86_64 OpenSSL
        id: cache-rosetta
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            /usr/local/Cellar/openssl@3
            /usr/local/opt/openssl@3
            /usr/local/bin/brew
          key: brew-rosetta-openssl3-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: brew-rosetta-openssl3-${{ runner.os }}-

      - name: Install x86_64 dependencies via Rosetta
        if: steps.cache-rosetta.outputs.cache-hit != 'true'
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install openssl@3

      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-macos-universal-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: cargo-macos-universal-

      - name: Build aarch64
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target aarch64-apple-darwin $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          PKG_CONFIG_PATH: /opt/homebrew/opt/openssl@3/lib/pkgconfig

      - name: Build x86_64
        run: |
          FEATURES=""
          if [ "$RELEASE_BUILD" = "true" ]; then
            FEATURES="--features crash-reporting"
          fi
          cargo build --release --target x86_64-apple-darwin $FEATURES
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          PKG_CONFIG_PATH: /usr/local/opt/openssl@3/lib/pkgconfig

      - name: Test (native aarch64 only)
        run: cargo test --release --target aarch64-apple-darwin

      - name: Install dump_syms
        if: env.RELEASE_BUILD == 'true'
        run: cargo install dump_syms

      - name: Extract macOS symbols
        if: env.RELEASE_BUILD == 'true'
        run: |
          dump_syms target/aarch64-apple-darwin/release/pcloud-cli > pcloud-cli-macos-arm64.sym
          dump_syms target/x86_64-apple-darwin/release/pcloud-cli > pcloud-cli-macos-x86_64.sym

      - name: Upload macOS symbols
        if: env.RELEASE_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: symbols-macos
          path: "*.sym"
          retention-days: 5

      - name: Create universal binary
        run: |
          lipo -create -output pcloud-cli-macos-universal \
            target/aarch64-apple-darwin/release/pcloud-cli \
            target/x86_64-apple-darwin/release/pcloud-cli
          lipo -info pcloud-cli-macos-universal
          strip pcloud-cli-macos-universal

      - name: Upload universal binary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-universal
          path: pcloud-cli-macos-universal
          retention-days: 5

  upload-symbols:
    runs-on: ubuntu-latest
    needs: [setup, build-and-test, build-macos]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    container: ghcr.io/${{ needs.setup.outputs.repo_lc }}/ci:2.1
    steps:
      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          path: artifacts/

      - name: Download macOS symbols
        uses: actions/download-artifact@v4
        with:
          name: symbols-macos
          path: artifacts/symbols-macos/

      - name: Extract Linux symbols
        run: |
          for arch in linux-amd64 linux-arm64 linux-armhf; do
            bin="artifacts/binary-${arch}/pcloud-cli"
            if [ -f "$bin" ]; then
              chmod +x "$bin"
              dump_syms "$bin" > "pcloud-cli-${arch}.sym"
              echo "Extracted symbols for ${arch}"
            fi
          done

      - name: Upload all symbols to Bugsnag
        run: |
          # Collect macOS symbols alongside Linux ones
          cp artifacts/symbols-macos/*.sym . 2>/dev/null || true
          for sym in *.sym; do
            [ -f "$sym" ] || continue
            echo "Uploading ${sym}..."
            curl --fail --silent --show-error \
              -F "apiKey=${BUGSNAG_API_KEY}" \
              -F "symbolFile=@${sym}" \
              https://upload.bugsnag.com/breakpad
          done
          echo "All symbols uploaded."
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}

  package:
    runs-on: ubuntu-latest
    needs: [setup, lint, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    container: ghcr.io/${{ needs.setup.outputs.repo_lc }}/ci:2.1
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact-name: linux-amd64
            strip-cmd: strip
            deb-arch: amd64
            rpm-arch: x86_64
          - target: aarch64-unknown-linux-gnu
            artifact-name: linux-arm64
            strip-cmd: aarch64-linux-gnu-strip
            deb-arch: arm64
            rpm-arch: aarch64
          - target: armv7-unknown-linux-gnueabihf
            artifact-name: linux-armhf
            strip-cmd: arm-linux-gnueabihf-strip
            deb-arch: armhf
            rpm-arch: armv7hl
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.artifact-name }}
          path: target/${{ matrix.target }}/release/

      - name: Ensure binary is executable
        run: chmod +x target/${{ matrix.target }}/release/pcloud-cli

      - name: Build .deb
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Build .rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Strip binary
        run: ${{ matrix.strip-cmd }} target/${{ matrix.target }}/release/pcloud-cli

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.artifact-name }}
          retention-days: 30
          path: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm
            target/${{ matrix.target }}/release/pcloud-cli

  release:
    runs-on: ubuntu-latest
    needs: [package, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract tag message
        id: tag-message
        run: |
          # Fetch the annotated tag object (shallow checkout doesn't include it)
          git fetch origin tag "$GITHUB_REF_NAME" --no-tags --force
          TAG_MSG="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" 2>/dev/null || true)"
          # Strip the tag name header line (first line) if it matches the tag
          TAG_MSG="$(echo "$TAG_MSG" | sed '1{/^'"$GITHUB_REF_NAME"'$/d}')"
          # Strip leading separator line
          TAG_MSG="$(echo "$TAG_MSG" | sed '1{/^-\+$/d}')"
          # Trim leading/trailing blank lines
          TAG_MSG="$(echo "$TAG_MSG" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')"
          {
            echo "body<<TAGEOF"
            echo "$TAG_MSG"
            echo "TAGEOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Linux binaries and packages
          for arch in linux-amd64 linux-arm64 linux-armhf; do
            if [ -d "artifacts/packages-${arch}" ]; then
              # Rename binary with arch suffix
              cp "artifacts/packages-${arch}/release/pcloud-cli" "release/pcloud-cli-${arch}" 2>/dev/null || \
              cp "artifacts/packages-${arch}/"*/release/pcloud-cli "release/pcloud-cli-${arch}" 2>/dev/null || true

              # Copy .deb packages
              find "artifacts/packages-${arch}" -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true

              # Copy .rpm packages
              find "artifacts/packages-${arch}" -name '*.rpm' -exec cp {} release/ \; 2>/dev/null || true
            fi
          done

          # GitHub replaces ~ with . in release asset names, so rename
          # .deb files proactively to keep URLs predictable.
          # (cargo-deb uses ~ for Debian pre-release versions, e.g. 3.0.0~preview-04)
          for f in release/*~*.deb; do
            [ -e "$f" ] || continue
            mv "$f" "$(echo "$f" | tr '~' '.')"
          done

          # macOS universal binary
          if [ -d "artifacts/binary-macos-universal" ]; then
            cp "artifacts/binary-macos-universal/pcloud-cli-macos-universal" "release/pcloud-cli-macos-universal" 2>/dev/null || true
          fi

          ls -la release/

      - name: Detect package filenames
        id: pkgnames
        run: |
          echo "deb_amd64=$(basename release/*_amd64.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "deb_arm64=$(basename release/*_arm64.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "deb_armhf=$(basename release/*_armhf.deb 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_x86_64=$(basename release/*.x86_64.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_aarch64=$(basename release/*.aarch64.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rpm_armv7=$(basename release/*.armv7.rpm 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: ${{ steps.tag-message.outputs.body == '' }}
          files: release/*
          body: |
            ${{ steps.tag-message.outputs.body != '' && format('## What''s Changed\n\n{0}\n\n', steps.tag-message.outputs.body) || '' }}
            
            ## Installation
            ---

            ### Linux

            #### Binary download

            Static binaries are available for three architectures. Pick the one matching your system:

            **x86_64 (64-bit Intel/AMD)**
            ```bash
            curl -L -o pcloud-cli https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-cli-linux-amd64
            chmod +x pcloud-cli && mv pcloud-cli ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud-cli /usr/local/bin/
            ```

            **ARM 64-bit (Raspberry Pi 4/5, AWS Graviton, etc.)**
            ```bash
            curl -L -o pcloud-cli https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-cli-linux-arm64
            chmod +x pcloud-cli && mv pcloud-cli ~/.local/bin/
            ```

            **ARM 32-bit (Raspberry Pi 2/3, older ARM boards)**
            ```bash
            curl -L -o pcloud-cli https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-cli-linux-armhf
            chmod +x pcloud-cli && mv pcloud-cli ~/.local/bin/
            ```

            > **Runtime dependencies for binary installs:** The binary requires FUSE 2 (`libfuse.so.2`), SQLite 3, and OpenSSL 3 to be installed on your system. See the [Dependencies](#dependencies) section below.

            #### Packages

            ##### Debian / Ubuntu (.deb)

            The `.deb` package will install runtime dependencies automatically.

            | Architecture | Command |
            |---|---|
            | x86_64 | `curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_amd64 }} && sudo dpkg -i ${{ steps.pkgnames.outputs.deb_amd64 }}` |
            | ARM 64-bit | `curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_arm64 }} && sudo dpkg -i ${{ steps.pkgnames.outputs.deb_arm64 }}` |
            | ARM 32-bit | `curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.deb_armhf }} && sudo dpkg -i ${{ steps.pkgnames.outputs.deb_armhf }}` |

            ##### Fedora / RHEL (.rpm)

            | Architecture | Command |
            |---|---|
            | x86_64 | `curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.rpm_x86_64 }} && sudo rpm -i ${{ steps.pkgnames.outputs.rpm_x86_64 }}` |
            | ARM 64-bit | `curl -L -O https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkgnames.outputs.rpm_aarch64 }} && sudo rpm -i ${{ steps.pkgnames.outputs.rpm_aarch64 }}` |

            ##### Arch Linux (build from source)

            Requires the `base-devel` group. A [PKGBUILD](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/pkg/arch/PKGBUILD) is provided for x86_64, aarch64, and armv7h:

            ```bash
            sudo pacman -S --needed base-devel
            curl -L -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/pkg/arch/PKGBUILD
            makepkg -si
            ```

            ---

            ### macOS (Apple Silicon & Intel)

            > **Prerequisites** — install only what you don't already have:
            >
            > ```bash
            > brew install --cask macfuse   # Required: provides FUSE support
            > brew install openssl@3        # Required: provides TLS support
            > ```

            ```bash
            curl -L -o pcloud-cli https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pcloud-cli-macos-universal
            chmod +x pcloud-cli && mv pcloud-cli ~/.local/bin/
            # System-wide install (requires root):
            # sudo mv pcloud-cli /usr/local/bin/
            ```

            ---

            ### Dependencies

            The binary and packages require **FUSE 2** (`libfuse.so.2`), **SQLite 3**, and **OpenSSL 3** at runtime. Package installs (`.deb`, `.rpm`) handle this automatically; for binary installs or if dependencies are missing, install them manually:

            #### Debian / Ubuntu

            ```bash
            # Ubuntu 24.04+, Debian 13+ (note the t64 suffix for 64-bit time compatibility)
            sudo apt update && sudo apt install -y libfuse2t64 libsqlite3-0 openssl

            # Ubuntu 22.04, Debian 11/12
            sudo apt update && sudo apt install -y libfuse2 libsqlite3-0 openssl
            ```

            #### Fedora / RHEL / CentOS

            ```bash
            # Fedora 36–43, RHEL 9/10
            sudo dnf install -y fuse-libs sqlite-libs openssl

            # RHEL 8 / CentOS 8 (ships OpenSSL 1.1.1 by default — also install OpenSSL 3)
            sudo yum install -y fuse-libs sqlite-libs openssl openssl3
            ```

            > **Note on Fedora 40+:** The `fuse-libs` package providing `libfuse.so.2` has been removed from the default repos. You may need to install it from a Fedora 39 or older package, or use FUSE 3 with a compatibility layer.

            #### Arch Linux

            ```bash
            sudo pacman -S fuse2 sqlite openssl
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
